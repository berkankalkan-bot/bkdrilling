<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BK Drilling - Coming Soon</title>
    <meta name="description" content="BK Drilling - Professional drilling equipment and spare parts supplier for Sandvik, Epiroc, Atlas Copco and Tamrock machines. Site under construction.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        @media (min-width: 768px) { body { overflow-y: auto; } }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 16px 16px;
            max-width: 700px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @media (min-width: 768px) { .container { min-height: auto; display: block; padding-bottom: 40px; } }

        @keyframes logo-glow {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(229,57,53,0.8)) drop-shadow(0 0 20px rgba(229,57,53,0.5)) drop-shadow(0 0 40px rgba(229,57,53,0.3));
            }
            33% {
                filter: drop-shadow(0 0 12px rgba(255,107,107,0.9)) drop-shadow(0 0 25px rgba(255,107,107,0.6)) drop-shadow(0 0 50px rgba(229,57,53,0.4));
            }
            66% {
                filter: drop-shadow(0 0 15px rgba(255,255,255,0.7)) drop-shadow(0 0 30px rgba(255,107,107,0.5)) drop-shadow(0 0 45px rgba(229,57,53,0.35));
            }
        }

        .logo-img {
            width: 300px;
            height: auto;
            margin-top: 200px;
            margin-bottom: 8px;
            animation: logo-glow 3s ease-in-out infinite;
        }
        @media (min-width: 768px) { .logo-img { width: 420px; margin-top: 60px; } }
        @media (min-width: 1024px) { .logo-img { width: 480px; } }

        @keyframes border-flow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(229,57,53,0.4), 0 0 40px rgba(229,57,53,0.2), inset 0 0 20px rgba(229,57,53,0.1); }
            50% { box-shadow: 0 0 30px rgba(229,57,53,0.6), 0 0 60px rgba(229,57,53,0.3), inset 0 0 30px rgba(229,57,53,0.15); }
        }
        @keyframes text-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(229,57,53,0.5), 0 0 20px rgba(229,57,53,0.3); }
            50% { text-shadow: 0 0 15px rgba(229,57,53,0.8), 0 0 30px rgba(229,57,53,0.5), 0 0 45px rgba(229,57,53,0.3); }
        }

        .premium-box {
            position: relative;
            display: inline-block;
            padding: 14px 24px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            margin-top: auto;
            margin-bottom: 12px;
            animation: glow-pulse 3s ease-in-out infinite;
        }
        @media (min-width: 768px) { .premium-box { padding: 20px 40px; margin-top: 20px; } }
        .premium-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            padding: 2px;
            background: linear-gradient(90deg, #E53935, #FF6B6B, #fff, #FF6B6B, #E53935, #FF6B6B, #fff, #FF6B6B, #E53935);
            background-size: 300% 100%;
            animation: border-flow 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .title-text {
            color: #E53935;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            animation: text-glow 3s ease-in-out infinite;
        }
        @media (min-width: 768px) { .title-text { font-size: 2.25rem; } }
        @media (min-width: 1024px) { .title-text { font-size: 3rem; } }

        @keyframes shimmer {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .shimmer-text {
            background: linear-gradient(90deg, #E53935 0%, #E53935 35%, #FF6B6B 45%, #fff 50%, #FF6B6B 55%, #E53935 65%, #E53935 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) { .shimmer-text { font-size: 1rem; } }

        .buttons {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        @media (min-width: 640px) { .buttons { gap: 16px; margin-bottom: 32px; } }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            transition: transform 0.2s;
        }
        @media (min-width: 768px) { .btn { padding: 12px 24px; font-size: 1rem; gap: 8px; } }
        .btn:hover { transform: scale(1.05); }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #20bd5a; }
        .btn-email { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-email:hover { background: rgba(255,255,255,0.2); }
        .btn svg { width: 20px; height: 20px; fill: currentColor; }

        .social-links { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
        @media (min-width: 768px) { .social-links { margin-top: 32px; } }
        .social-link {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .social-link:hover { transform: scale(1.1); }
        .social-link svg { width: 20px; height: 20px; fill: white; }
        .instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
        .linkedin { background: #0077B5; }

        .brands { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 20px; margin-bottom: 16px; }
        @media (min-width: 768px) { .brands { margin-top: 32px; } }

        img { pointer-events: none; -webkit-user-drag: none; }

        #webgl {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
    const isMobile = innerWidth < 768;
    const SPHERE_COUNT = isMobile ? 24 : 42;
    const SEG = isMobile ? 16 : 24;
    const partImages = [
      '/images/parts/0108 1690 07 SPRING PIN.jpg',
      '/images/parts/151 756 68 COUPLING.png',
      '/images/parts/152 143 18 bushing.png',
      '/images/parts/207 906 08 SHAFT.jpg',
      '/images/parts/207 908 58 COVER.png',
      '/images/parts/208 907 38 PIN.jpg',
      '/images/parts/263 487 98 BRACKET.png',
      '/images/parts/264 367 58 COVER.png',
      '/images/parts/3115 2382 00 DAMPING PISTON.png',
      '/images/parts/3115 3251 00 GUIDE.png',
      '/images/parts/3115 3431 00 DRIVER_01.jpg',
      '/images/parts/3115 3474 00 LINER.png',
      '/images/parts/3125 1983 80 EXPANDING SHAFT.jpg',
      '/images/parts/3128 0784 18 PROFILE.png',
      '/images/parts/3176 7969 00 NIPPLE.jpg',
      '/images/parts/3177 3023 00 DIRECTION VALVE.png',
      '/images/parts/323 004 28 PISTON ROD ASSEMBLY.png',
      '/images/parts/330 016 98 SLIPPER PAD.png',
      '/images/parts/3322 3097 45 DR ST SUPP HALF.png',
      '/images/parts/352 346 78 GUARD.png',
      '/images/parts/5112 3023 43 PRESSURE SWITCH.png',
      '/images/parts/550 183 54 HOSE SUPPORT.png',
      '/images/parts/550 316 07 SAFETY LIMIT SWITCH.png',
      '/images/parts/550 508 28 COUPLING.png',
      '/images/parts/550 513 27 CABLE ENTRY PLATE.png'
    ];

    // Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(25, innerWidth / innerHeight, 0.1, 100);
    camera.position.z = 24;

    const renderer = new THREE.WebGLRenderer({
      canvas: document.querySelector("#webgl"),
      antialias: true,
      alpha: true,
      premultipliedAlpha: false
    });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1 : 1.5));
    renderer.setClearColor(0x000000, 0);

    // Radii - sadece SPHERE_COUNT kadar
    const rScale = isMobile ? 0.8 : 1;
    const radii = [
      0.75, 0.55, 0.65, 0.4, 0.7, 0.6, 0.7, 0.35, 0.45, 0.55,
      0.4, 0.5, 0.55, 0.6, 0.4, 0.65, 0.6, 0.45, 0.55, 0.35,
      0.7, 0.55, 0.4, 0.35, 0.5, 0.5, 0.6, 0.45, 0.55, 0.4,
      0.65, 0.5, 0.45, 0.55, 0.4, 0.5, 0.6, 0.45, 0.55, 0.35,
      0.5, 0.45
    ].map(r => r * rScale);

    // Pozisyonlar - logo etrafinda esit dagilim
    const positions = [];
    const logoCenter = { x: 0, y: isMobile ? 1.5 : 1.8 };

    // 25 balonu esit acilarda dagit (her biri 360/25 = 14.4 derece)
    for (let i = 0; i < SPHERE_COUNT; i++) {
      const layer = i < 16 ? 0 : (i < 30 ? 1 : 2);
      const minR = [1.5, 2.5, 3.5][layer];
      const maxR = [2.5, 3.5, 4.5][layer];
      const r = minR + Math.random() * (maxR - minR);
      const countInLayer = layer === 0 ? 16 : (layer === 1 ? 14 : 12);
      const startIdx = layer === 0 ? 0 : (layer === 1 ? 16 : 30);
      const idxInLayer = i - startIdx;
      const angle = (idxInLayer / countInLayer) * Math.PI * 2 + (layer * 0.3);
      const x = logoCenter.x + Math.cos(angle) * r;
      const y = logoCenter.y + Math.sin(angle) * r;
      positions.push({ x, y, z: (Math.random() - 0.5) * 2.5 });
    }

    function removeWhiteBackground(image) {
      const c = document.createElement('canvas');
      c.width = image.width || 256;
      c.height = image.height || 256;
      const ctx = c.getContext('2d');
      ctx.drawImage(image, 0, 0);
      try {
        const id = ctx.getImageData(0, 0, c.width, c.height);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) d[i+3] = 0;
          else if (d[i] > 170 && d[i+1] > 170 && d[i+2] > 170) d[i+3] = Math.floor(255 * (1 - (d[i] - 170) / 85));
        }
        ctx.putImageData(id, 0, 0);
      } catch(e) {}
      return c;
    }

    function loadTexture(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const tex = new THREE.CanvasTexture(removeWhiteBackground(img));
          tex.needsUpdate = true;
          resolve(tex);
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    // Fresnel shader
    const vShader = `
      varying vec3 vN, vV;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vN = normalize(mat3(modelMatrix) * normal);
        vV = normalize(cameraPosition - wp.xyz);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }`;

    const fShader = `
      uniform vec3 uColor;
      uniform float uOpacity;
      varying vec3 vN, vV;
      void main() {
        float f = pow(1.0 - abs(dot(vV, vN)), 3.0);
        vec3 col = mix(uColor * 0.2, uColor * 1.8, f);
        float a = clamp(mix(uOpacity * 0.05, uOpacity * 0.8, f), 0.0, 0.7);
        gl_FragColor = vec4(col, a);
      }`;

    const sphereColors = [
      new THREE.Color(0x4488ff), new THREE.Color(0x66aaff),
      new THREE.Color(0x88ccff), new THREE.Color(0x5599ee),
      new THREE.Color(0x7799dd), new THREE.Color(0x99bbff),
      new THREE.Color(0x6688cc)
    ];

    // Shared geometry - 24 segments (performans icin)
    const sharedGeoms = {};
    function getGeom(r) {
      const key = r.toFixed(2);
      if (!sharedGeoms[key]) sharedGeoms[key] = new THREE.SphereGeometry(r, SEG, SEG);
      return sharedGeoms[key];
    }

    const spheres = [];
    const forces = new Map();
    const tv = new THREE.Vector3();
    const cwp = new THREE.Vector3();

    async function init() {
      // Texture'lari paralel yukle
      const textures = (await Promise.all(partImages.map(loadTexture))).filter(Boolean);

      for (let i = 0; i < SPHERE_COUNT; i++) {
        const r = radii[i], pos = positions[i];
        const mat = new THREE.ShaderMaterial({
          uniforms: { uColor: { value: sphereColors[i % 7] }, uOpacity: { value: 0.7 } },
          vertexShader: vShader, fragmentShader: fShader,
          transparent: true, side: THREE.FrontSide, depthWrite: false
        });
        const sphere = new THREE.Mesh(getGeom(r), mat);
        sphere.position.set(pos.x, pos.y, pos.z);
        sphere.userData = { op: { ...pos }, r };
        sphere.renderOrder = 1;

        if (textures.length > 0) {
          const ps = r * 1.5;
          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(ps, ps),
            new THREE.MeshBasicMaterial({ map: textures[i % textures.length], transparent: true, side: THREE.DoubleSide, depthWrite: false })
          );
          plane.renderOrder = 0;
          sphere.add(plane);
          sphere.userData.ip = plane;
        }
        spheres.push(sphere);
        scene.add(sphere);
      }

      // Lighting - minimal
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));

      startAnimation();
    }

    // Loading animation
    function startAnimation() {
      spheres.forEach(s => { s.position.y = -25; });
      spheres.forEach((s, i) => {
        gsap.timeline()
          .to(s.position, {
            duration: 1, y: 4, ease: "power1.out",
            onUpdate() {
              s.position.z = s.userData.op.z + Math.sin(this.progress() * Math.PI) * 4;
            },
            delay: i * 0.02
          })
          .to(s.position, {
            duration: 1, y: -5, ease: "power1.out",
            onUpdate() {
              s.position.z = s.userData.op.z - Math.sin(this.progress() * Math.PI) * 4;
            }
          })
          .to(s.position, {
            duration: 0.6,
            x: s.userData.op.x, y: s.userData.op.y, z: s.userData.op.z,
            ease: "power1.out"
          });
      });
    }

    // Under construction kutusu exclusion
    const exBoxW = 4.5, exBoxTop = -1.5;

    let ready = false;
    setTimeout(() => { ready = true; }, 3500);

    // Mouse
    const mouse = new THREE.Vector2();
    const rc = new THREE.Raycaster();

    function handleInteraction(cx, cy) {
      if (!ready) return;
      mouse.x = (cx / innerWidth) * 2 - 1;
      mouse.y = -(cy / innerHeight) * 2 + 1;
      rc.setFromCamera(mouse, camera);
      const hits = rc.intersectObjects(spheres);
      if (hits.length) {
        const f = new THREE.Vector3();
        f.subVectors(hits[0].point, hits[0].object.position).normalize().multiplyScalar(0.2);
        forces.set(hits[0].object.uuid, f);
      }
    }

    window.addEventListener("mousemove", e => handleInteraction(e.clientX, e.clientY));
    window.addEventListener("touchmove", e => {
      const t = e.touches[0];
      if (t) handleInteraction(t.clientX, t.clientY);
    }, { passive: true });
    window.addEventListener("touchstart", e => {
      const t = e.touches[0];
      if (t) handleInteraction(t.clientX, t.clientY);
    }, { passive: true });

    // Pinch zoom engelle
    window.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });

    // Sag tik ve kopyalama engelle
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());

    function animate() {
      requestAnimationFrame(animate);

      if (ready) {
        const bt = Date.now() * 0.002;
        for (let i = 0; i < spheres.length; i++) {
          const s = spheres[i];
          const off = i * 0.2;
          const by = Math.sin(bt + off) * 0.1;
          const bz = Math.cos(bt + off) * 0.05;

          const f = forces.get(s.uuid);
          if (f) {
            s.position.add(f);
            f.multiplyScalar(0.95);
            if (f.length() < 0.01) forces.delete(s.uuid);
          }

          tv.set(s.userData.op.x, s.userData.op.y + by, s.userData.op.z + bz);
          s.position.lerp(tv, 0.018);

          // Billboard
          if (s.userData.ip) {
            camera.getWorldPosition(cwp);
            s.userData.ip.lookAt(s.worldToLocal(cwp.clone()));
          }

          // Under construction exclusion
          const r = s.userData.r;
          if (s.position.y - r < exBoxTop && Math.abs(s.position.x) < exBoxW + r) {
            s.position.y = exBoxTop + r;
          }
        }

        // Collision - sadece yakin olanlari kontrol et
        for (let i = 0; i < spheres.length; i++) {
          for (let j = i + 1; j < spheres.length; j++) {
            const a = spheres[i], b = spheres[j];
            const d = a.position.distanceTo(b.position);
            const min = (a.userData.r + b.userData.r) * 1.2;
            if (d < min) {
              tv.subVectors(b.position, a.position).normalize();
              const p = (min - d) * 0.4;
              a.position.sub(tv.clone().multiplyScalar(p));
              b.position.add(tv.clone().multiplyScalar(p));
            }
          }
        }
      }

      renderer.render(scene, camera);
    }

    init().then(animate);

    window.addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
